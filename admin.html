<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Administrativo - Tio Nan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --bg: #070707; --card: #111; }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            display: none; /* Escondido até validar a senha */
        }
        .admin-container { padding: 30px; max-width: 1100px; margin: 0 auto; }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #222; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }
        h1 { color: var(--gold); margin: 0; font-size: 1.6rem; }
        
        #global-loader { color: var(--gold); font-weight: bold; font-size: 0.9rem; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; color: var(--gold); margin: 5px 0 0; }

        .table-wrapper { overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; color: var(--gold); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .badge-sim { background: #1b4332; color: #74c69d; }
        .badge-nao { background: #431b1b; color: #c67474; }

        .btn-action { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; transition: 0.3s; margin-right: 4px; }
        .btn-ativar { background: #28a745; color: white; }
        .btn-esgotar { background: #dc3545; color: white; }
        .btn-action:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>📦 Gestão Interna Tio Nan</h1>
            <div id="global-loader" style="display:none;">⏳ Sincronizando...</div>
        </header>

        <div class="stats">
            <div class="stat-card"><h3>Cadastrados</h3><p id="total">0</p></div>
            <div class="stat-card"><h3>Ativos</h3><p id="ativos" style="color: #28a745;">0</p></div>
            <div class="stat-card"><h3>Esgotados</h3><p id="esgotados" style="color: #dc3545;">0</p></div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Ref</th>
                        <th>Sabor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    <tr><td colspan="4" style="text-align:center; padding: 40px;">Carregando inventário...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SENHA_MESTRA = "tionan2020"; // Senha atualizada
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhko5hp5dl0-UR9TqquM5NPY6w_yieNq_SK4okzY2jieC1WmSqE1XHp1VurimuQWn2/exec";
        
        // Gatekeeper de Segurança
        const entrada = prompt("Área Administrativa - Digite a Senha:");
        if (entrada === SENHA_MESTRA) {
            document.body.style.display = "block";
            loadData();
        } else {
            alert("Acesso negado.");
            window.location.href = "index.html";
        }

        async function alterarStatus(id, novoStatus) {
            document.getElementById('global-loader').style.display = "block";
            document.querySelectorAll('.btn-action').forEach(b => b.disabled = true);

            try {
                // Dispara o comando para o Google Apps Script
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ id: id, status: novoStatus })
                });

                // Aguarda o processamento da planilha e recarrega a visão
                setTimeout(loadData, 2500);
            } catch (e) {
                alert("Erro ao conectar com o servidor.");
                document.getElementById('global-loader').style.display = "none";
            }
        }

        async function loadData() {
            const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
            const URL_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&t=${new Date().getTime()}`;
            
            try {
                const response = await fetch(URL_CSV);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                const tabela = document.getElementById('tabela-corpo');
                tabela.innerHTML = '';
                
                let countAtivos = 0, countEsgotados = 0;

                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 3) return;

                    const id = cols[0].replace(/"/g, '').trim();
                    const nome = cols[1].replace(/"/g, '').trim();
                    const disp = cols[3] ? cols[3].replace(/"/g, '').trim().toLowerCase() : 'sim';

                    if (disp === 'sim') countAtivos++; else countEsgotados++;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><code>${id}</code></td>
                        <td><b>${nome}</b></td>
                        <td><span class="badge badge-${disp}">${disp === 'sim' ? 'ATIVO' : 'ESGOTADO'}</span></td>
                        <td>
                            <button class="btn-action btn-ativar" ${disp === 'sim' ? 'disabled' : ''} onclick="alterarStatus('${id}', 'sim')">ATIVAR</button>
                            <button class="btn-action btn-esgotar" ${disp === 'nao' ? 'disabled' : ''} onclick="alterarStatus('${id}', 'nao')">ESGOTAR</button>
                        </td>
                    `;
                    tabela.appendChild(tr);
                });

                document.getElementById('total').innerText = rows.length;
                document.getElementById('ativos').innerText = countAtivos;
                document.getElementById('esgotados').innerText = countEsgotados;
                document.getElementById('global-loader').style.display = "none";

            } catch (error) {
                tabela.innerHTML = '<tr><td colspan="4" style="text-align:center;">Erro ao sincronizar dados.</td></tr>';
            }
        }
    </script>
</body>
</html>
