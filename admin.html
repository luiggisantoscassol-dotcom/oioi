<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Tio Nan - Gestão & Lucro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #070707; --card: #111; --green: #28a745; --border: #333; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; display: none; }
        .admin-container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--gold); font-size: 1.5rem; margin: 0; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { background: #222; color: #888; border: none; padding: 12px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: #000; }

        .panel { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); display: none; }
        .panel.active { display: block; }

        .fin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .fin-card { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .fin-card h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .fin-card p { font-size: 2rem; font-weight: bold; margin: 0; }
        .lucro-val { color: var(--green); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; font-size: 0.9rem; }
        th { color: var(--gold); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .btn-sheet { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; }
        
        #loader { color: var(--gold); font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <header>
        <h1>📦 Tio Nan Business Intelligence</h1>
        <div id="loader">⏳ Sincronizando...</div>
        <a href="https://docs.google.com/spreadsheets/d/1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho/edit" target="_blank" class="btn-sheet">ABRIR PLANILHA</a>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'estoque')">📦 Estoque</button>
        <button class="tab-btn" onclick="switchTab(event, 'vendas')">💰 Vendas & Lucro</button>
    </div>

    <div id="estoque" class="panel active">
        <table>
            <thead><tr><th>Ref</th><th>Sabor</th><th>Status Site</th></tr></thead>
            <tbody id="corpo-estoque"></tbody>
        </table>
    </div>

    <div id="vendas" class="panel">
        <div class="fin-grid">
            <div class="fin-card"><h3>Faturamento</h3><p id="fat-total">R$ 0,00</p></div>
            <div class="fin-card"><h3>Custo Total</h3><p id="custo-total">R$ 0,00</p></div>
            <div class="fin-card"><h3>Lucro Líquido</h3><p id="lucro-total" class="lucro-val">R$ 0,00</p></div>
        </div>
        <table>
            <thead><tr><th>Data</th><th>Cliente</th><th>Total</th><th>Lucro</th><th>Status</th></tr></thead>
            <tbody id="corpo-vendas"></tbody>
        </table>
    </div>
</div>

<script>
    const SENHA_MESTRA = "tionan2020";
    const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
    const GID_ESTOQUE = "0"; 
    const GID_VENDAS = "1901875162"; // Seu GID atualizado

    // Gatekeeper
    const entrada = prompt("Acesso Administrativo:");
    if(entrada === SENHA_MESTRA) { document.body.style.display = "block"; carregarTudo(); }
    else { window.location.href = "index.html"; }

    function switchTab(evt, name) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    async function carregarTudo() {
        document.getElementById('loader').style.display = "block";
        await Promise.all([fetchCSV(GID_ESTOQUE, renderEstoque), fetchCSV(GID_VENDAS, renderVendas)]);
        document.getElementById('loader').style.display = "none";
    }

    async function fetchCSV(gid, callback) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${new Date().getTime()}`;
        const res = await fetch(url);
        const text = await res.text();
        callback(text.split('\n').slice(1));
    }

    function renderEstoque(rows) {
        const corpo = document.getElementById('corpo-estoque');
        corpo.innerHTML = rows.map(row => {
            const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if(!c) return '';
            const disp = c[3].replace(/"/g,'').trim().toUpperCase();
            return `<tr><td>${c[0].replace(/"/g,'')}</td><td><b>${c[1].replace(/"/g,'')}</b></td><td><span style="color:${disp==='SIM'?'#28a745':'#dc3545'}">${disp}</span></td></tr>`;
        }).join('');
    }

    function renderVendas(rows) {
        let fat = 0, custoTotal = 0;
        const corpo = document.getElementById('corpo-vendas');
        corpo.innerHTML = rows.map(row => {
            const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if(!c || c.length < 5) return '';
            
            const total = parseFloat(c[3].replace(/"/g,'').replace(',','.')) || 0;
            const custoPed = parseFloat(c[4].replace(/"/g,'').replace(',','.')) || 0;
            const lucroPed = total - custoPed;
            
            fat += total; 
            custoTotal += custoPed;

            return `<tr>
                <td>${c[0].replace(/"/g,'')}</td>
                <td><b>${c[1].replace(/"/g,'')}</b></td>
                <td>R$ ${total.toFixed(2)}</td>
                <td style="color:var(--green)">R$ ${lucroPed.toFixed(2)}</td>
                <td><span class="badge" style="background:#222; border:1px solid var(--gold)">${c[5].replace(/"/g,'')}</span></td>
            </tr>`;
        }).join('');

        document.getElementById('fat-total').innerText = `R$ ${fat.toFixed(2)}`;
        document.getElementById('custo-total').innerText = `R$ ${custoTotal.toFixed(2)}`;
        document.getElementById('lucro-total').innerText = `R$ ${(fat - custoTotal).toFixed(2)}`;
    }
</script>
</body>
</html>
