<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cachaça do Tio Nan - Loja Oficial</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-soft: #e5c05b;
            --bg: #070707;
            --card-bg: #111;
        }

        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; }

        /* --- GRID DE PRODUTOS --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }

        /* --- CARD DO PRODUTO --- */
        .card-produto { 
            background: var(--card-bg); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
            border: 1px solid #222;
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* --- CORREÇÃO DO BUG DE IMAGENS --- */
        .swiper-produto { width: 100%; height: 300px; margin-bottom: 15px; }
        
        .swiper-slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            transition: opacity 0.4s ease;
        }

        /* Setinhas Douradas (Mobile) */
        .swiper-button-next, .swiper-button-prev { 
            color: var(--gold) !important; 
            display: none; /* Escondido por padrão */
        }
        .swiper-button-next::after, .swiper-button-prev::after { font-size: 20px !important; font-weight: bold; }

        /* LÓGICA DESKTOP (PC) */
        @media (min-width: 1024px) {
            .card-produto:hover { transform: translateY(-5px); border-color: var(--gold); }
            
            /* Efeito Hover: Troca da Foto 1 pela Foto 2 */
            .card-produto:hover .foto-1 { opacity: 0; }
            .card-produto:hover .foto-2 { opacity: 1 !important; }
            
            .foto-2 { 
                position: absolute; 
                top: 0; 
                left: 0; 
                opacity: 0; 
                z-index: 2;
            }
        }

        /* LÓGICA MOBILE (Celular) */
        @media (max-width: 1023px) {
            .swiper-button-next, .swiper-button-prev { display: flex; } /* Mostra setas no celular */
            .foto-2 { opacity: 1 !important; position: relative !important; }
        }

        /* --- TEXTOS E BOTÃO --- */
        .produto-nome { font-size: 1.2rem; color: var(--gold); margin: 15px 0 5px; text-transform: uppercase; }
        .produto-preco { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; display: block; }
        
        .btn-comprar {
            background: var(--gold);
            color: #000;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-comprar:hover { background: var(--gold-soft); transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="container">
        <div id="vitrine" class="grid-produtos">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const SHEET_ID = "1MjcWuXWOXJGJ-vyei-C_Zg5SPWCeUd-NFQxLib2G6ho";
        const URL_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        async function carregarProdutos() {
            try {
                const response = await fetch(URL_CSV + "&t=" + new Date().getTime());
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const vitrine = document.getElementById('vitrine');

                vitrine.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 4) return;

                    const nome = cols[1].replace(/"/g, '');
                    const preco = cols[2].replace(/"/g, '');
                    const disponivel = cols[3].replace(/"/g, '').toLowerCase().trim();
                    
                    // IDs das fotos no Drive (ajuste se necessário)
                    const foto1 = cols[4] ? cols[4].replace(/"/g, '') : ''; 
                    const foto2 = cols[5] ? cols[5].replace(/"/g, '') : '';

                    if (disponivel === 'sim') {
                        vitrine.innerHTML += `
                            <div class="card-produto">
                                <div class="swiper swiper-produto">
                                    <div class="swiper-wrapper">
                                        <div class="swiper-slide"><img src="${foto1}" class="foto-1"></div>
                                        <div class="swiper-slide"><img src="${foto2}" class="foto-2"></div>
                                    </div>
                                    <div class="swiper-button-next"></div>
                                    <div class="swiper-button-prev"></div>
                                    <div class="swiper-pagination"></div>
                                </div>
                                <h3 class="produto-nome">${nome}</h3>
                                <span class="produto-preco">R$ ${preco}</span>
                                <a href="https://wa.me/5551991448888?text=Olá! Gostaria de encomendar a ${nome}" class="btn-comprar">PEDIR NO WHATSAPP</a>
                            </div>
                        `;
                    }
                });

                // INICIALIZA O SWIPER (Apenas se for Mobile)
                if (window.innerWidth < 1024) {
                    new Swiper('.swiper-produto', {
                        loop: true,
                        navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                        pagination: { el: '.swiper-pagination', clickable: true },
                    });
                }

            } catch (error) {
                console.error("Erro ao carregar vitrine:", error);
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
